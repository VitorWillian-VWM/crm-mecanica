<section class="patio-page">

    <div class="os-actions">
        <button class="btn-main" id="abrirModalOS" type="button">
            <i class="ri-add-circle-line"></i>
            Nova Ordem de Serviço
        </button>
    </div>

    <div class="glass-card">
        <div class="consulta-header">
            <div>
                <h3>Ordens de Serviço</h3>
                <p>Controle os veículos em manutenção no pátio.</p>
            </div>

            <div class="search-box">
                <i class="ri-search-line"></i>
                <input type="text" id="buscaOS" placeholder="Buscar por cliente ou placa...">
            </div>
        </div>

        <div class="clientes-resumo">
            <span id="totalOS">0 ordens de serviço abertas</span>
        </div>

        <div id="osGrid" class="clientes-grid lista-os">
            <p class="empty-message">Nenhuma ordem de serviço cadastrada.</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalOS">
        <div class="modal-card">

            <div class="modal-header">
                <div>
                    <h3>Nova Ordem de Serviço</h3>
                    <p>Preencha os dados do atendimento da oficina.</p>
                </div>

                <button class="btn-close-modal" id="fecharModalOS" type="button">
                    <i class="ri-close-line"></i>
                </button>
            </div>

            <form id="osForm" class="modal-form">

                <div class="form-2-cols">
                    <div>
                        <label>Cliente</label>
                        <input type="text" id="osCliente" placeholder="Nome do cliente" required>
                    </div>

                    <div>
                        <label>Telefone / WhatsApp</label>
                        <input type="text" id="osTelefone" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="form-3-cols">
                    <div>
                        <label>Placa</label>
                        <input type="text" id="osPlaca" placeholder="ABC1D23" required>
                    </div>

                    <div>
                        <label>Marca</label>
                        <input type="text" id="osMarca" placeholder="Ex: Fiat">
                    </div>

                    <div>
                        <label>Modelo</label>
                        <input type="text" id="osModelo" placeholder="Ex: Uno">
                    </div>
                </div>

                <div class="form-2-cols">
                    <div>
                        <label>Data de entrada</label>
                        <input type="date" id="osDataEntrada">
                    </div>

                    <div>
                        <label>Status</label>
                        <select id="osStatus">
                            <option value="aberta">Aberta</option>
                            <option value="em_andamento">Em andamento</option>
                            <option value="aguardando_peca">Aguardando peça</option>
                            <option value="finalizada">Finalizada</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label>Problema relatado pelo cliente</label>
                    <textarea id="osProblema" rows="3" placeholder="Ex: carro falhando, barulho no motor..."></textarea>
                </div>

                <div>
                    <label>Serviço a ser realizado</label>
                    <textarea id="osServico" rows="3" placeholder="Ex: revisão, troca de óleo, diagnóstico..."></textarea>
                </div>

                <div class="form-3-cols">
                    <div>
                        <label>Mão de obra (R$)</label>
                        <input type="number" id="osMaoObra" placeholder="0.00" step="0.01">
                    </div>

                    <div>
                        <label>Peças (R$)</label>
                        <input type="number" id="osPecas" placeholder="0.00" step="0.01">
                    </div>

                    <div>
                        <label>Forma de pagamento</label>
                        <select id="osPagamento">
                            <option value="">Selecione</option>
                            <option value="dinheiro">Dinheiro</option>
                            <option value="pix">Pix</option>
                            <option value="cartao">Cartão</option>
                            <option value="pendente">Pendente</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label>Observações internas</label>
                    <textarea id="osObs" rows="3" placeholder="Informações adicionais da oficina..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-soft" id="cancelarModalOS">
                        Cancelar
                    </button>

                    <button type="submit" class="btn-main">
                        <i class="ri-save-3-line"></i>
                        Salvar O.S
                    </button>
                </div>

            </form>
        </div>
    </div>

</section>
